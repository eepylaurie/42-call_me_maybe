name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv pip install --system numpy pydantic flake8 mypy pytest

      - name: Lint (flake8)
        run: flake8 src tests --extend-exclude=.venv,llm_sdk

      - name: Type-check (mypy)
        run: mypy src tests --warn-return-any --warn-unused-ignores --ignore-missing-imports --disallow-untyped-defs --check-untyped-defs

      - name: Test (pytest)
        run: PYTHONPATH=. pytest tests/ -v
